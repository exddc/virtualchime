name: Version Gate

on:
  pull_request:
  workflow_dispatch:
    inputs:
      base_ref:
        description: "Base git ref/sha to compare from (for manual runs)"
        required: false
        default: "origin/main"
      head_ref:
        description: "Head git ref/sha to compare to (for manual runs)"
        required: false
        default: "HEAD"

jobs:
  version-bump-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate version bump policy
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            base_ref="${{ github.event.inputs.base_ref }}"
            head_ref="${{ github.event.inputs.head_ref }}"
          else
            base_ref="${{ github.event.pull_request.base.sha }}"
            head_ref="${{ github.event.pull_request.head.sha }}"
          fi

          if [ -z "${base_ref}" ] || [ -z "${head_ref}" ]; then
            echo "Missing base/head refs for version check" >&2
            exit 1
          fi

          bash ./scripts/check_version_bump.sh "${base_ref}" "${head_ref}"
